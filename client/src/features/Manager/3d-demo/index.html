<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Glasses Viewer</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <div class="viewer" id="viewer">
        <canvas id="c"></canvas>
        <div class="loading" id="loading" aria-live="polite">
          <div class="spinner" aria-hidden="true"></div>
          <div class="loadingText" id="loadingText">Loading 3D…</div>
        </div>
        <div class="error" id="error" hidden></div>
      </div>

      <aside class="panel" aria-label="Controls">
        <button class="btn" id="btnExplore" type="button" aria-pressed="false">Explore</button>
        <button class="btn" id="btnReset" type="button">Reset View</button>
      </aside>
    </main>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="./viewer.js"></script>
  </body>
</html>
